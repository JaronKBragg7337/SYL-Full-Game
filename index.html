<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>SYL — Space You Land (Foundation Build)</title>
<style>
  /* ============================================================
     SYL UI stylesheet. Owned by: src/ui/ui.js (structure) + here (look).
     Future agents: add new panels as .syl-panel; keep HUD minimal.
     ============================================================ */
  html, body { margin:0; padding:0; overflow:hidden; background:#000; height:100%;
               font-family:'Segoe UI', Consolas, monospace; color:#cfd8dc; }
  #game-canvas { display:block; width:100vw; height:100vh; }
  #ui-root { position:fixed; inset:0; pointer-events:none; }
  .syl-hud { position:absolute; top:12px; left:12px; background:rgba(8,12,16,0.72);
             border:1px solid #2e3b45; border-left:3px solid #b71c1c; padding:10px 14px;
             font-size:13px; line-height:1.55; min-width:230px; white-space:pre; }
  .syl-hud .state { color:#ef9a9a; font-weight:bold; letter-spacing:1px; }
  .syl-prompt { position:absolute; bottom:18%; left:50%; transform:translateX(-50%);
                background:rgba(8,12,16,0.8); border:1px solid #4e342e; padding:8px 18px;
                font-size:15px; color:#ffcc80; display:none; }
  .syl-toast { position:absolute; top:12px; left:50%; transform:translateX(-50%);
               background:rgba(20,8,8,0.85); border:1px solid #b71c1c; padding:10px 20px;
               font-size:14px; color:#ffebee; display:none; }
  .syl-panel { position:absolute; top:50%; left:50%; transform:translate(-50%,-50%);
               background:rgba(8,12,16,0.985); border:1px solid #37474f; border-top:3px solid #b71c1c;
               padding:18px 22px; min-width:520px; max-width:760px; max-height:80vh; overflow-y:auto;
               font-size:13px; display:none; pointer-events:auto; }
  .syl-panel h2 { margin:0 0 10px 0; font-size:16px; color:#ef9a9a; letter-spacing:2px; }
  .syl-panel table { width:100%; border-collapse:collapse; }
  .syl-panel td, .syl-panel th { padding:4px 8px; border-bottom:1px solid #263238; text-align:left; }
  .syl-panel button { background:#263238; color:#cfd8dc; border:1px solid #455a64;
                      padding:3px 10px; cursor:pointer; font-family:inherit; font-size:12px; }
  .syl-panel button:hover:not(:disabled) { background:#37474f; border-color:#b71c1c; }
  .syl-panel button:disabled { opacity:0.35; cursor:default; }
  .syl-panel .panel-close { position:sticky; top:0; float:right; z-index:2; margin:0 0 8px 12px;
                            background:#1f2a30; color:#ffccbc; border-color:#8d3b35; }
  .ok   { color:#a5d6a7; } .bad { color:#ef9a9a; } .dim { color:#607d8b; } .warn { color:#ffcc80; }
  .syl-help { position:absolute; bottom:12px; left:12px; background:rgba(8,12,16,0.6);
              border:1px solid #263238; padding:8px 12px; font-size:11px; line-height:1.6; color:#78909c; }
  .syl-center-msg { position:absolute; top:40%; left:50%; transform:translate(-50%,-50%);
                    text-align:center; font-size:18px; color:#eceff1; display:none;
                    background:rgba(8,12,16,0.85); border:1px solid #b71c1c; padding:20px 40px; }
  .syl-vignette { position:absolute; inset:0; box-shadow:inset 0 0 180px rgba(0,0,0,0.55); }
  .mp-chip { position:fixed; right:12px; top:12px; z-index:12; pointer-events:none;
             background:rgba(8,12,16,0.72); border:1px solid #2e3b45; border-right:3px solid #64b5f6;
             color:#cfe8ff; padding:7px 10px; font-size:11px; letter-spacing:0.08em; text-transform:uppercase; }
  #boot-msg { position:absolute; top:50%; left:50%; transform:translate(-50%,-50%);
              color:#78909c; font-size:14px; letter-spacing:2px; }
  @media (max-width: 700px) {
    .syl-hud {
      top:calc(8px + env(safe-area-inset-top, 0px));
      left:8px;
      min-width:0;
      max-width:calc(100vw - 18px);
      box-sizing:border-box;
      padding:8px 10px;
      font-size:11px;
      line-height:1.45;
      white-space:pre-wrap;
    }
    .syl-prompt {
      bottom:calc(138px + env(safe-area-inset-bottom, 0px));
      width:max-content;
      max-width:calc(100vw - 28px);
      box-sizing:border-box;
      padding:7px 12px;
      font-size:13px;
      text-align:center;
    }
    .syl-toast {
      top:calc(96px + env(safe-area-inset-top, 0px));
      max-width:calc(100vw - 28px);
      box-sizing:border-box;
      padding:8px 12px;
      font-size:12px;
      text-align:center;
    }
    .syl-panel {
      top:calc(8px + env(safe-area-inset-top, 0px));
      left:8px;
      right:8px;
      bottom:calc(8px + env(safe-area-inset-bottom, 0px));
      transform:none;
      min-width:0;
      max-width:none;
      max-height:none;
      width:auto;
      box-sizing:border-box;
      padding:12px;
      font-size:11px;
      overflow:auto;
    }
    .syl-panel h2 { font-size:13px; letter-spacing:1.4px; }
    .syl-panel table { min-width:0; }
    .syl-panel.ship-panel table { min-width:520px; }
    .syl-panel.map-panel td, .syl-panel.map-panel th {
      padding:4px 5px;
      white-space:normal;
      overflow-wrap:anywhere;
    }
    .syl-panel button { padding:4px 8px; font-size:11px; }
    .syl-panel .panel-close { min-width:62px; height:34px; font-size:12px; }
    .mp-chip {
      top:calc(8px + env(safe-area-inset-top, 0px));
      right:8px;
      max-width:calc(100vw - 210px);
      box-sizing:border-box;
      overflow:hidden;
      text-overflow:ellipsis;
      white-space:nowrap;
      font-size:9px;
      padding:5px 7px;
    }
    .syl-help {
      display:none;
      left:8px;
      right:8px;
      bottom:calc(128px + env(safe-area-inset-bottom, 0px));
      max-height:88px;
      overflow:auto;
      box-sizing:border-box;
      font-size:10px;
    }
    .syl-center-msg {
      width:calc(100vw - 44px);
      box-sizing:border-box;
      padding:14px 18px;
      font-size:15px;
    }
  }
</style>
</head>
<body>
<canvas id="game-canvas"></canvas>
<div id="ui-root"><div id="boot-msg">SYL — INITIALIZING WORLD…</div></div>
<script type="importmap">
  { "imports": { "three": "./lib/three.module.js" } }
</script>
<script type="module" src="./src/main.js"></script>
</body>
</html>
