name: Vex hard decouple mobile chase camera

on:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  apply:
    if: contains(github.event.head_commit.message, 'Add one-time mobile camera hard decouple patch runner')
    runs-on: ubuntu-latest
    steps:
      - name: Checkout main
        uses: actions/checkout@v4
        with:
          ref: main
          persist-credentials: true

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Apply mobile camera hard decouple patch
        run: |
          python3 - <<'PY'
          from pathlib import Path

          main_path = Path('src/main.js')
          main = main_path.read_text()

          old = """      const mobileStickSteering = input.touchMode && input.touchJoystickActive && Math.abs(input.touchShipYaw || 0) > 0.01;\n      if (!shipCamBaseReady) {\n        shipCamBaseQuat.copy(ship.quaternion);\n        shipCamBaseReady = true;\n      } else if (!mobileStickSteering) {\n        shipCamBaseQuat.slerp(ship.quaternion, Math.min(1, 10 * dt));\n      }"""
          new = """      if (!shipCamBaseReady) {\n        shipCamBaseQuat.copy(ship.quaternion);\n        shipCamBaseReady = true;\n      } else if (!input.touchMode) {\n        shipCamBaseQuat.slerp(ship.quaternion, Math.min(1, 10 * dt));\n      }"""
          if old not in main:
            raise SystemExit('main.js mobile camera block did not match expected text')
          main = main.replace(old, new, 1)
          main_path.write_text(main)

          workflow = Path('.github/workflows/vex-mobile-camera-hard-decouple.yml')
          if workflow.exists():
            workflow.unlink()
          PY

      - name: Install dependencies
        run: npm ci || npm install

      - name: Run tests
        run: npm test

      - name: Commit patched code
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add src/main.js .github/workflows/vex-mobile-camera-hard-decouple.yml
          if git diff --cached --quiet; then
            echo "No patch changes to commit."
            exit 0
          fi
          git commit -m "Hard decouple mobile stick from chase camera yaw"
          git push origin HEAD:main
