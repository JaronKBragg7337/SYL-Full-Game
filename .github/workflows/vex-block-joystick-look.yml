name: Vex block joystick look overlap

on:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  apply:
    if: contains(github.event.head_commit.message, 'Add one-time block joystick look patch runner')
    runs-on: ubuntu-latest
    steps:
      - name: Checkout main
        uses: actions/checkout@v4
        with:
          ref: main
          persist-credentials: true

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Apply joystick-look overlap patch
        run: |
          python3 - <<'PY'
          from pathlib import Path

          main_path = Path('src/main.js')
          main = main_path.read_text()

          old = """      const looking = input.touchMode\n        ? input.touchLookActive\n        : (input.pointerLocked && Math.abs(input.mouseDX) + Math.abs(input.mouseDY) > 0);"""
          new = """      const looking = input.touchMode\n        ? (input.touchLookActive && !input.touchJoystickActive)\n        : (input.pointerLocked && Math.abs(input.mouseDX) + Math.abs(input.mouseDY) > 0);"""
          if old not in main:
            raise SystemExit('main.js looking block did not match expected text')
          main = main.replace(old, new, 1)
          main_path.write_text(main)

          workflow = Path('.github/workflows/vex-block-joystick-look.yml')
          if workflow.exists():
            workflow.unlink()
          PY

      - name: Install dependencies
        run: npm ci || npm install

      - name: Run tests
        run: npm test

      - name: Commit patched code
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add src/main.js .github/workflows/vex-block-joystick-look.yml
          if git diff --cached --quiet; then
            echo "No patch changes to commit."
            exit 0
          fi
          git commit -m "Block joystick touches from ship camera look"
          git push origin HEAD:main
