name: Vex velocity chase camera test

on:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  apply:
    if: contains(github.event.head_commit.message, 'Add one-time velocity chase camera patch runner')
    runs-on: ubuntu-latest
    steps:
      - name: Checkout main
        uses: actions/checkout@v4
        with:
          ref: main
          persist-credentials: true

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Apply velocity-follow chase camera patch
        run: |
          python3 - <<'PY'
          from pathlib import Path

          p = Path('src/main.js')
          s = p.read_text()

          old_consts = """let shipCamBaseReady = false;\nconst shipCamBaseQuat = new THREE.Quaternion();"""
          new_consts = """let shipCamBaseReady = false;\nconst shipCamBaseQuat = new THREE.Quaternion();\nconst SHIP_CAM_MIN_TRAVEL_SPEED = 1.5;\nconst _shipCamUp = new THREE.Vector3(), _shipCamTravel = new THREE.Vector3(), _shipCamRight = new THREE.Vector3();\nconst _shipCamMatrix = new THREE.Matrix4();"""
          if old_consts not in s:
            raise SystemExit('camera const block not found')
          s = s.replace(old_consts, new_consts, 1)

          start_marker = """      _cv.set(0, 4.5, -15);\n      if (!shipCamBaseReady) {"""
          end_marker = """      _cv.applyAxisAngle(_touchCamX, shipTouchCamPitch);"""
          start = s.index(start_marker)
          end = s.index(end_marker, start)
          new_block = """      // Velocity-follow chase camera test:\n      // Movement input changes the ship/velocity; the camera follows the\n      // resulting travel direction instead of raw yaw input. When nearly\n      // stationary, keep the previous camera base so A/D or stick-side does\n      // not directly orbit the camera in place.\n      _cv.set(0, 4.5, -15);\n      const camUp = upAt(dominantBody(BODIES, ship.worldPos), ship.worldPos, _shipCamUp);\n      const travel = _shipCamTravel.copy(ship.velocity).addScaledVector(camUp, -ship.velocity.dot(camUp));\n      if (!shipCamBaseReady) {\n        shipCamBaseQuat.copy(ship.quaternion);\n        shipCamBaseReady = true;\n      }\n      if (travel.lengthSq() > SHIP_CAM_MIN_TRAVEL_SPEED * SHIP_CAM_MIN_TRAVEL_SPEED) {\n        travel.normalize();\n        _shipCamRight.crossVectors(camUp, travel);\n        if (_shipCamRight.lengthSq() > 1e-6) {\n          _shipCamRight.normalize();\n          _shipCamMatrix.makeBasis(_shipCamRight, camUp, travel);\n          _cq.setFromRotationMatrix(_shipCamMatrix);\n          shipCamBaseQuat.slerp(_cq, Math.min(1, 5 * dt));\n        }\n      }\n      const looking = input.touchMode\n        ? (input.touchLookActive && !input.touchJoystickActive)\n        : (input.pointerLocked && Math.abs(input.mouseDX) + Math.abs(input.mouseDY) > 0);\n      const arrowYaw = (input.down('ArrowRight') ? 1 : 0) - (input.down('ArrowLeft') ? 1 : 0);\n      const arrowPitch = (input.down('ArrowDown') ? 1 : 0) - (input.down('ArrowUp') ? 1 : 0);\n      const arrowLooking = arrowYaw !== 0 || arrowPitch !== 0;\n\n      if (looking) {\n        shipTouchCamYaw -= input.mouseDX * 0.003;\n        shipTouchCamPitch = Math.max(-0.75, Math.min(0.55, shipTouchCamPitch - input.mouseDY * 0.003));\n      }\n\n      if (arrowLooking) {\n        shipTouchCamYaw += arrowYaw * 1.8 * dt;\n        shipTouchCamPitch = Math.max(-0.75, Math.min(0.55, shipTouchCamPitch + arrowPitch * 1.2 * dt));\n      }\n\n      if (!looking && !arrowLooking) {\n        shipTouchCamYaw += (0 - shipTouchCamYaw) * Math.min(1, 4 * dt);\n        shipTouchCamPitch += (0 - shipTouchCamPitch) * Math.min(1, 4 * dt);\n      }\n"""
          s = s[:start] + new_block + s[end:]

          old_lerp = """  const mobilePilotingChase = input.touchMode && traversal.mode === MODE.PILOTING && chaseCam;\n  if (mobilePilotingChase) {\n    engine.cameraWorldPos.copy(camPos);\n    engine.camera.quaternion.copy(camQuat);\n  } else {\n    engine.cameraWorldPos.lerp(camPos, Math.min(1, 14 * dt));\n    engine.camera.quaternion.slerp(camQuat, Math.min(1, 14 * dt));\n  }"""
          new_lerp = """  engine.cameraWorldPos.lerp(camPos, Math.min(1, 14 * dt));\n  engine.camera.quaternion.slerp(camQuat, Math.min(1, 14 * dt));"""
          if old_lerp not in s:
            raise SystemExit('mobile direct camera lerp block not found')
          s = s.replace(old_lerp, new_lerp, 1)

          wf = Path('.github/workflows/vex-velocity-chase-camera.yml')
          if wf.exists():
            wf.unlink()
          p.write_text(s)
          PY

      - name: Install dependencies
        run: npm ci || npm install

      - name: Run tests
        run: npm test

      - name: Commit test patch
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add src/main.js .github/workflows/vex-velocity-chase-camera.yml
          if git diff --cached --quiet; then
            echo "No changes to commit."
            exit 0
          fi
          git commit -m "Test velocity-follow chase camera"
          git push origin HEAD:main

# trigger: velocity chase camera test
